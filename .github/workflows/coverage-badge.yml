name: Coverage Badge

on:
  push:
    branches:
      - master

jobs:
  coverage:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build
          pip install pytest pytest-cov requests
          pip install -e .[full]

      - name: Run tests with coverage
        env:
          NUMBA_DISABLE_JIT: 1
        run: |
          python -m pytest --cov=pyorps tests/ --cov-config=pyproject.toml --cov-report=term-missing > result.log 
          type result.log | Select-Object -Last 10

      - name: Generate coverage badge
        shell: pwsh
        env:
          NUMBA_DISABLE_JIT: 1
        run: |
          $coverage = (python -m pytest --cov=pyorps tests/ --cov-report=term | Select-String -Pattern '\d+%$' | Select-Object -Last 1).Matches.Value -replace '%',''
          $color = if ($coverage -lt 70) { 'red' } elseif ($coverage -lt 90) { 'orange' } else { 'green' }
          Invoke-WebRequest -Uri "https://img.shields.io/badge/coverage-${coverage}%25-${color}.svg" -OutFile coverage.svg

      - name: Deploy badge
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: gh-pages
